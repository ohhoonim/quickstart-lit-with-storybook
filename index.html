<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>quickstart-lit-library</title>
    <style>
      body {
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
        padding-bottom: 100px;
        font-family: sans-serif;
      }
      h2 {
        margin-top: 40px;
        border-bottom: 2px solid #eee;
        padding-bottom: 10px;
      }
      .section {
        background: #f9f9f9;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 15px;
      }
      button {
        padding: 8px 16px;
        cursor: pointer;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 14px;
      }
      button:hover {
        background: #2980b9;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import { render, html } from 'lit';
      import * as Components from './src/components/index.ts';

      // 애플리케이션 상태 관리 (단순화된 예제)
      let state = {
        tabs: [
          { id: 'home', title: '홈', pinned: true },
          { id: 'dashboard', title: '대시보드' }
        ],
        activeTabId: 'home',
        treeData: {
          id: 'root',
          label: '프로젝트 루트',
          expanded: true,
          children: [
            {
              id: 'src',
              label: 'src',
              expanded: true,
              children: [
                { id: 'components', label: 'components', children: [] },
                { id: 'index.ts', label: 'index.ts' }
              ]
            }
          ]
        },
        selectedNodeId: '',
        toasts: [],
        searchExpanded: true,
        startDate: '',
        endDate: ''
      };

      function updateApp() {
        render(App(), document.getElementById('app'));
      }

      const App = () => html`
        ${Components.ToastManager({ toasts: state.toasts })}

        <h1>Lit Component Library Examples</h1>
        
        <h2>Tab Navigator</h2>
        <div class="section">
          ${Components.TabNavigator({
            tabs: state.tabs,
            activeTabId: state.activeTabId,
            onTabClick: (id) => {
              state.activeTabId = id;
              updateApp();
            },
            onTabClose: (e, id) => {
              state.tabs = state.tabs.filter(t => t.id !== id);
              updateApp();
            }
          })}
          <div style="margin-top: 10px;">
            <button @click=${() => {
              const id = `tab-${Date.now()}`;
              state.tabs = [...state.tabs, { id, title: `새 탭 ${id}` }];
              state.activeTabId = id;
              updateApp();
            }}>새 탭 추가</button>
          </div>
        </div>

        <h2>Breadcrumb</h2>
        <div class="section">
          ${Components.Breadcrumb({
            items: [
              { label: '홈', href: '/' },
              { label: '사용자 관리', href: '/users' },
              { label: '상세 프로필' }
            ],
            onPathClick: (item) => showToast(`경로 클릭: ${item.label}`, 'info')
          })}
        </div>

        <h2>Search Panel</h2>
        ${Components.SearchPanel({
          expanded: state.searchExpanded,
          onToggle: () => {
            state.searchExpanded = !state.searchExpanded;
            updateApp();
          },
          onSearch: () => showToast(`검색 실행! 기간: ${state.startDate} ~ ${state.endDate}`, 'success'),
          onReset: () => showToast('필터가 초기화되었습니다.', 'info'),
          children: html`
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div class="form-group">
                <label>검색어</label>
                <input type="text" placeholder="이름 또는 부서">
              </div>
              <div class="form-group">
                <label>기간 선택</label>
                ${Components.DateRangePicker({
                  startDate: state.startDate,
                  endDate: state.endDate,
                  onRangeChange: (range) => {
                    state.startDate = range.start;
                    state.endDate = range.end;
                    updateApp();
                  }
                })}
              </div>
            </div>
          `
        })}

        <h2>Tree View</h2>
        <div class="section">
          <div style="border: 1px solid #ddd; padding: 10px; border-radius: 4px; background: white;">
            ${Components.TreeNode({
              node: state.treeData,
              onToggle: (id, expanded) => {
                updateNodeStatus(state.treeData, id, expanded);
                updateApp();
              },
              onSelect: (id) => {
                state.selectedNodeId = id;
                updateApp();
              }
            })}
          </div>
          <div style="margin-top: 10px;">선택된 노드 ID: ${state.selectedNodeId}</div>
        </div>
      `;

      function showToast(message, type) {
        const id = Date.now();
        state.toasts = [...state.toasts, { id, message, type }];
        updateApp();
        setTimeout(() => {
          state.toasts = state.toasts.filter(t => t.id !== id);
          updateApp();
        }, 3000);
      }

      function updateNodeStatus(nodes, id, expanded) {
        if (nodes.id === id) {
          nodes.expanded = expanded;
          return true;
        }
        if (nodes.children) {
          for (const child of nodes.children) {
            if (updateNodeStatus(child, id, expanded)) return true;
          }
        }
        return false;
      }

      // 초기 렌더링
      updateApp();
    </script>
  </body>
</html>
